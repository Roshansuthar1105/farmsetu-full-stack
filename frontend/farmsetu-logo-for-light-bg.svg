<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="100%" height="100%">
  <defs>
    <!-- Google Fonts import for Comfortaa & Hind -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&amp;family=Hind:wght@700&amp;display=swap');
      .text-farm {
        font-family: 'Comfortaa', 'Outfit', sans-serif;
        font-size: 50px;
        font-weight: 700;
        fill: #8bc53f; /* Green "Farm" for light background */
      }
      .text-setu {
        font-family: 'Hind', 'Noto Sans Devanagari', sans-serif;
        font-size: 52px;
        font-weight: 700;
        fill: #35a5db; /* Blue "सेतु" */
      }
    </style>
    <!-- Leaf Gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ba239"/>
      <stop offset="60%" stop-color="#8cc63f"/>
      <stop offset="100%" stop-color="#a2d450"/>
    </linearGradient>
  </defs>

  <!-- Word "Farm" (Green) -->
  <text x="5" y="58" class="text-farm">Farm</text>

  <!-- Arched Connecting Bridge (Blue) -->
  <g stroke="#35a5db" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top Rail -->
    <path d="M 80,38 C 105,10 160,10 185,29" stroke-width="3"/>
    <!-- Bottom Arch -->
    <path d="M 76,50 C 102,23 162,23 188,38" stroke-width="3.5"/>
    
    <!-- Vertical Posts -->
    <line x1="93" y1="31" x2="93" y2="44" stroke-width="2"/>
    <line x1="108" y1="24" x2="108" y2="39" stroke-width="2"/>
    <line x1="124" y1="20" x2="124" y2="36" stroke-width="2"/>
    <line x1="140" y1="19" x2="140" y2="35" stroke-width="2"/>
    <line x1="156" y1="20" x2="156" y2="35" stroke-width="2"/>
    <line x1="172" y1="24" x2="172" y2="37" stroke-width="2"/>
    
    <!-- Minor horizontal rails inside bridge frame -->
    <path d="M 81,42 C 105,16 160,16 185,33" stroke-width="1.2" opacity="0.8"/>
  </g>

  <!-- Word "सेतु" (Blue) -->
  <text x="180" y="58" class="text-setu">सेतु</text>

  <!-- Leaf sitting curve on the "से" matra -->
  <g transform="translate(196, -6) scale(0.24)">
    <!-- Leaf Base (Green with White Outline) -->
    <path d="M 68,76 C 58,58 70,40 85,28 C 102,10 132,6 142,6 C 142,6 140,32 128,54 C 115,76 96,82 78,82 C 70,82 68,76 68,76 Z" fill="url(#leafGrad)" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Central Leaf Vein -->
    <path d="M 72,72 C 85,60 102,40 138,8" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    
    <!-- Side Leaf Veins -->
    <path d="M 88,58 C 82,50 82,45 82,45" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 98,48 C 94,38 95,33 95,33" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 112,34 C 108,24 109,20 109,20" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 98,48 C 106,48 112,50 112,50" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 112,34 C 122,34 126,38 126,38" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Circuit Node on Leaf -->
    <circle cx="118" cy="46" r="5" fill="#ffffff"/>
    <circle cx="118" cy="46" r="2" fill="#8cc63f"/>
  </g>
</svg>
