<div class="space-y-6">
  <fs-admin-page-header title="Crop Catalog Repository" subtitle="Configure crops in the system, translation names, and standard growth attributes.">
    <button (click)="onAdd()" class="fs-btn-primary flex items-center space-x-2 text-sm">
      <span>+ Add Crop</span>
    </button>
  </fs-admin-page-header>

  <!-- Data Table -->
  <fs-admin-data-table
    [columns]="columns"
    [data]="crops()"
    [loading]="loading()"
    [totalElements]="totalElements()"
    [page]="page()"
    [pageSize]="size()"
    [rowActions]="rowActions"
    [filters]="filters"
    [selectable]="false"
    searchPlaceholder="Search crops by name..."
    emptyMessage="No crops found"
    (pageChange)="onPageChange($event)"
    (searchChange)="onSearch($event)"
    (filterChange)="onFilterChange($event)"
    (rowActionEvent)="onRowAction($event)">
  </fs-admin-data-table>

  <!-- Edit/Add Modal -->
  <fs-admin-modal [open]="showEditModal()" [title]="isEditMode() ? 'Edit Crop Details' : 'Add New Crop'" (close)="showEditModal.set(false)">
    <form *ngIf="selectedCrop()" (ngSubmit)="onSave()" class="space-y-4">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Crop Name (English)</label>
          <input type="text" [(ngModel)]="selectedCrop().name" name="name"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Hindi Name (Local Name)</label>
          <input type="text" [(ngModel)]="localNameHi" name="localNameHi"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            placeholder="e.g. गेहूं" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Crop Season</label>
          <select [(ngModel)]="selectedCrop().season" name="season"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm">
            <option value="KHARIF">Kharif</option>
            <option value="RABI">Rabi</option>
            <option value="ZAID">Zaid</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Growing Days</label>
          <input type="number" [(ngModel)]="selectedCrop().growingDays" name="growingDays"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
      </div>

      <div class="grid sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Water Requirement</label>
          <input type="text" [(ngModel)]="selectedCrop().waterRequirement" name="waterRequirement"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            placeholder="e.g. High, Medium, Low" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Average Yield (Per Acre)</label>
          <input type="number" step="0.1" [(ngModel)]="selectedCrop().averageYieldPerAcre" name="averageYieldPerAcre"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Market Price (Per Quintal)</label>
          <input type="number" step="0.01" [(ngModel)]="selectedCrop().averageMarketPrice" name="averageMarketPrice"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Suitable Soil Types (comma separated)</label>
        <input type="text" [(ngModel)]="soilTypesRaw" name="soilTypesRaw"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
          placeholder="e.g. Clayey, Loamy, Alluvial" />
      </div>
    </form>
    <div footer>
      <button (click)="showEditModal.set(false)"
        class="px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl text-sm">Cancel</button>
      <button (click)="onSave()" class="fs-btn-primary text-sm ml-2">Save Crop</button>
    </div>
  </fs-admin-modal>

  <!-- Delete Dialog -->
  <fs-admin-confirm-dialog
    [open]="showDeleteDialog()"
    title="Delete Crop"
    message="Are you sure you want to delete this crop? This action cannot be undone."
    (confirm)="confirmDelete()"
    (cancel)="showDeleteDialog.set(false)">
  </fs-admin-confirm-dialog>
</div>
