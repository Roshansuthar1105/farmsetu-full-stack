<div class="space-y-6">
  <fs-admin-page-header title="Insurance Catalog Repository" subtitle="Register and manage crop insurance schemes and calculation guidelines.">
    <button (click)="onAdd()" class="fs-btn-primary flex items-center space-x-2 text-sm">
      <span>+ Add Insurance</span>
    </button>
  </fs-admin-page-header>

  <!-- Data Table -->
  <fs-admin-data-table
    [columns]="columns"
    [data]="insuranceSchemes()"
    [loading]="loading()"
    [totalElements]="totalElements()"
    [page]="page()"
    [pageSize]="size()"
    [rowActions]="rowActions"
    [selectable]="false"
    searchPlaceholder="Search insurance schemes by name..."
    emptyMessage="No insurance schemes found"
    (pageChange)="onPageChange($event)"
    (searchChange)="onSearch($event)"
    (rowActionEvent)="onRowAction($event)">
  </fs-admin-data-table>

  <!-- Edit/Add Modal -->
  <fs-admin-modal [open]="showEditModal()" [title]="isEditMode() ? 'Edit Insurance Details' : 'Add New Insurance Scheme'" (close)="showEditModal.set(false)">
    <form *ngIf="selectedScheme()" (ngSubmit)="onSave()" class="space-y-4">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Scheme Name</label>
          <input type="text" [(ngModel)]="selectedScheme().name" name="name"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Partner Insurance Company</label>
          <input type="text" [(ngModel)]="selectedScheme().partnerCompany" name="partnerCompany"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Official Registration Link (URL)</label>
          <input type="url" [(ngModel)]="selectedScheme().officialLink" name="officialLink"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Premium Calculation Formula/Text</label>
          <input type="text" [(ngModel)]="selectedScheme().premiumCalculationFormula" name="premiumCalculationFormula"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            placeholder="e.g. 2% of Sum Insured" />
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Coverage Details</label>
        <textarea [(ngModel)]="selectedScheme().coverageDetails" name="coverageDetails" rows="2"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Eligibility Criteria</label>
        <textarea [(ngModel)]="selectedScheme().eligibility" name="eligibility" rows="2"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Claim Process</label>
        <textarea [(ngModel)]="selectedScheme().claimProcess" name="claimProcess" rows="2"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Description</label>
        <textarea [(ngModel)]="selectedScheme().description" name="description" rows="2"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>
    </form>
    <div footer>
      <button (click)="showEditModal.set(false)"
        class="px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl text-sm">Cancel</button>
      <button (click)="onSave()" class="fs-btn-primary text-sm ml-2">Save Scheme</button>
    </div>
  </fs-admin-modal>

  <!-- Delete Dialog -->
  <fs-admin-confirm-dialog
    [open]="showDeleteDialog()"
    title="Delete Scheme"
    message="Are you sure you want to delete this insurance scheme? This action cannot be undone."
    (confirm)="confirmDelete()"
    (cancel)="showDeleteDialog.set(false)">
  </fs-admin-confirm-dialog>
</div>
