<div class="space-y-6">
  <fs-admin-page-header title="Mandi Registry" subtitle="Configure and update Mandi directories, locations, operating hours, and info.">
    <button (click)="onAdd()" class="fs-btn-primary flex items-center space-x-2 text-sm">
      <span>+ Add Mandi</span>
    </button>
  </fs-admin-page-header>

  <!-- Data Table -->
  <fs-admin-data-table
    [columns]="columns"
    [data]="mandis()"
    [loading]="loading()"
    [totalElements]="totalElements()"
    [page]="page()"
    [pageSize]="size()"
    [rowActions]="rowActions"
    [selectable]="false"
    searchPlaceholder="Search mandis by name..."
    emptyMessage="No mandis found"
    (pageChange)="onPageChange($event)"
    (searchChange)="onSearch($event)"
    (rowActionEvent)="onRowAction($event)">
  </fs-admin-data-table>

  <!-- Edit/Add Modal -->
  <fs-admin-modal [open]="showEditModal()" [title]="isEditMode() ? 'Edit Mandi Details' : 'Add New Mandi'" (close)="showEditModal.set(false)">
    <form *ngIf="selectedMandi()" (ngSubmit)="onSave()" class="space-y-4">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Mandi Name</label>
          <input type="text" [(ngModel)]="selectedMandi().name" name="name"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Contact Phone</label>
          <input type="text" [(ngModel)]="selectedMandi().contactPhone" name="contactPhone"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">District</label>
          <input type="text" [(ngModel)]="selectedMandi().district" name="district"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">State</label>
          <input type="text" [(ngModel)]="selectedMandi().state" name="state"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
      </div>

      <div class="grid sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Operating Hours</label>
          <input type="text" [(ngModel)]="selectedMandi().operatingHours" name="operatingHours"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            placeholder="e.g. 9 AM - 6 PM" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Latitude</label>
          <input type="number" step="0.000001" [(ngModel)]="selectedMandi().latitude" name="latitude"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Longitude</label>
          <input type="number" step="0.000001" [(ngModel)]="selectedMandi().longitude" name="longitude"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Address</label>
        <textarea [(ngModel)]="selectedMandi().address" name="address" rows="2"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>
    </form>
    <div footer>
      <button (click)="showEditModal.set(false)"
        class="px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl text-sm">Cancel</button>
      <button (click)="onSave()" class="fs-btn-primary text-sm ml-2">Save Mandi</button>
    </div>
  </fs-admin-modal>

  <!-- Delete Dialog -->
  <fs-admin-confirm-dialog
    [open]="showDeleteDialog()"
    title="Delete Mandi"
    message="Are you sure you want to delete this mandi? This action cannot be undone."
    (confirm)="confirmDelete()"
    (cancel)="showDeleteDialog.set(false)">
  </fs-admin-confirm-dialog>
</div>
