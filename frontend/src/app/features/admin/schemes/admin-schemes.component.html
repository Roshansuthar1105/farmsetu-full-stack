<div class="space-y-6">
  <fs-admin-page-header title="Government Schemes Repository" subtitle="Register and manage central and state government schemes for farmers.">
    <button (click)="onAdd()" class="fs-btn-primary flex items-center space-x-2 text-sm">
      <span>+ Add Scheme</span>
    </button>
  </fs-admin-page-header>

  <!-- Data Table -->
  <fs-admin-data-table
    [columns]="columns"
    [data]="schemes()"
    [loading]="loading()"
    [totalElements]="totalElements()"
    [page]="page()"
    [pageSize]="size()"
    [rowActions]="rowActions"
    [filters]="filters"
    [selectable]="false"
    searchPlaceholder="Search schemes by name..."
    emptyMessage="No schemes found"
    (pageChange)="onPageChange($event)"
    (searchChange)="onSearch($event)"
    (filterChange)="onFilterChange($event)"
    (rowActionEvent)="onRowAction($event)">
  </fs-admin-data-table>

  <!-- Edit/Add Modal -->
  <fs-admin-modal [open]="showEditModal()" [title]="isEditMode() ? 'Edit Scheme Details' : 'Add New Scheme'" (close)="showEditModal.set(false)">
    <form *ngIf="selectedScheme()" (ngSubmit)="onSave()" class="space-y-4">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Scheme Name</label>
          <input type="text" [(ngModel)]="selectedScheme().name" name="name"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Official Link (URL)</label>
          <input type="url" [(ngModel)]="selectedScheme().officialLink" name="officialLink"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Scheme Type</label>
          <select [(ngModel)]="selectedScheme().schemeType" name="schemeType"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm">
            <option value="CENTRAL">Central</option>
            <option value="STATE">State</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">State (If State Scheme)</label>
          <input type="text" [(ngModel)]="selectedScheme().state" name="state"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            [disabled]="selectedScheme().schemeType === 'CENTRAL'" />
        </div>
      </div>

      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Deadline</label>
          <input type="date" [(ngModel)]="selectedScheme().deadline" name="deadline"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Helpline Phone</label>
          <input type="text" [(ngModel)]="selectedScheme().helpline" name="helpline"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Eligibility Criteria</label>
        <textarea [(ngModel)]="selectedScheme().eligibilityCriteria" name="eligibilityCriteria" rows="2"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Benefits</label>
        <textarea [(ngModel)]="selectedScheme().benefits" name="benefits" rows="2"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Application Process</label>
        <textarea [(ngModel)]="selectedScheme().applicationProcess" name="applicationProcess" rows="2"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Description</label>
        <textarea [(ngModel)]="selectedScheme().description" name="description" rows="2"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>
    </form>
    <div footer>
      <button (click)="showEditModal.set(false)"
        class="px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl text-sm">Cancel</button>
      <button (click)="onSave()" class="fs-btn-primary text-sm ml-2">Save Scheme</button>
    </div>
  </fs-admin-modal>

  <!-- Delete Dialog -->
  <fs-admin-confirm-dialog
    [open]="showDeleteDialog()"
    title="Delete Scheme"
    message="Are you sure you want to delete this scheme? This action cannot be undone."
    (confirm)="confirmDelete()"
    (cancel)="showDeleteDialog.set(false)">
  </fs-admin-confirm-dialog>
</div>
