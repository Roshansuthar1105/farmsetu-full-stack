<div class="p-6 md:p-8 space-y-8 max-w-7xl mx-auto pb-24">
  <!-- Header Section -->
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div>
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white tracking-tight">System Farms</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
        Overview of all farms registered in the system colored by owner.
      </p>
    </div>
  </div>

  @if (loading()) {
    <div class="flex flex-col items-center justify-center py-20 space-y-4">
      <div class="w-12 h-12 border-4 border-green-500/20 border-t-green-500 rounded-full animate-spin"></div>
      <p class="text-sm text-gray-500 font-medium animate-pulse">Loading system farms map...</p>
    </div>
  } @else {
    <div class="bg-white dark:bg-gray-900 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-xl overflow-hidden relative" style="height: 70vh; min-height: 500px;">
      <div id="adminFarmsMap" class="w-full h-full z-10 relative"></div>
      
      <!-- Overlay legend -->
      <div class="absolute bottom-6 left-6 z-20 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md p-4 rounded-xl border border-gray-100 dark:border-gray-800 shadow-lg pointer-events-none">
        <h4 class="font-bold text-sm text-gray-800 dark:text-white mb-2">Map Legend</h4>
        <div class="flex items-center gap-2 mb-1">
          <div class="w-3 h-3 rounded-full bg-gray-400"></div>
          <span class="text-xs text-gray-600 dark:text-gray-300">Each color represents a different user</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 border-2 border-gray-400 bg-gray-400/40"></div>
          <span class="text-xs text-gray-600 dark:text-gray-300">Polygons represent farm boundaries</span>
        </div>
      </div>
    </div>
  }
</div>
