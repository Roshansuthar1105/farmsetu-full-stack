<div class="space-y-6">
  <fs-admin-page-header title="Product Catalog Management" subtitle="Add, edit, or remove listings from the Marketplace.">
    <button (click)="onAdd()" class="fs-btn-primary flex items-center space-x-2 text-sm">
      <span>+ Add Product</span>
    </button>
  </fs-admin-page-header>

  <!-- Data Table -->
  <fs-admin-data-table
    [columns]="columns"
    [data]="products()"
    [loading]="loading()"
    [totalElements]="totalElements()"
    [page]="page()"
    [pageSize]="size()"
    [rowActions]="rowActions"
    [filters]="filters"
    [selectable]="false"
    searchPlaceholder="Search products by title..."
    emptyMessage="No products found"
    (pageChange)="onPageChange($event)"
    (searchChange)="onSearch($event)"
    (filterChange)="onFilterChange($event)"
    (rowActionEvent)="onRowAction($event)">
  </fs-admin-data-table>

  <!-- Edit/Add Modal -->
  <fs-admin-modal [open]="showEditModal()" [title]="isEditMode() ? 'Edit Product Listing' : 'Add New Product Listing'" (close)="showEditModal.set(false)">
    <form *ngIf="selectedProduct()" (ngSubmit)="onSave()" class="space-y-4">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Product Title</label>
          <input type="text" [(ngModel)]="selectedProduct().title" name="title"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Seller (Assign User)</label>
          <select [(ngModel)]="selectedProduct().sellerId" name="sellerId"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required [disabled]="isEditMode()">
            <option *ngFor="let user of users()" [value]="user.id">{{ user.name }} ({{ user.role }})</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Category</label>
          <select [(ngModel)]="selectedProduct().category" name="category"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm">
            <option value="SEEDS">Seeds</option>
            <option value="FERTILIZERS">Fertilizers</option>
            <option value="TOOLS">Tools</option>
            <option value="EQUIPMENT">Equipment</option>
            <option value="PESTICIDES">Pesticides</option>
            <option value="ORGANIC_PRODUCTS">Organic Products</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Condition</label>
          <select [(ngModel)]="selectedProduct().condition" name="condition"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm">
            <option value="NEW">New</option>
            <option value="USED">Used</option>
          </select>
        </div>
      </div>

      <div class="grid sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Price (₹)</label>
          <input type="number" step="0.01" [(ngModel)]="selectedProduct().price" name="price"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Quantity</label>
          <input type="number" [(ngModel)]="selectedProduct().quantity" name="quantity"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Unit</label>
          <input type="text" [(ngModel)]="selectedProduct().unit" name="unit"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            placeholder="e.g. kg, pieces" />
        </div>
      </div>

      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Location</label>
          <input type="text" [(ngModel)]="selectedProduct().location" name="location"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            placeholder="e.g. Pune, Maharashtra" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Listing Status</label>
          <select [(ngModel)]="selectedProduct().status" name="status"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm">
            <option value="ACTIVE">ACTIVE</option>
            <option value="SOLD">SOLD</option>
            <option value="CANCELLED">CANCELLED</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Description</label>
        <textarea [(ngModel)]="selectedProduct().description" name="description" rows="3"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>
    </form>
    <div footer>
      <button (click)="showEditModal.set(false)"
        class="px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl text-sm">Cancel</button>
      <button (click)="onSave()" class="fs-btn-primary text-sm ml-2">Save Product</button>
    </div>
  </fs-admin-modal>

  <!-- Cancel Listing Dialog -->
  <fs-admin-confirm-dialog
    [open]="showDeleteDialog()"
    title="Cancel Product Listing"
    message="Are you sure you want to cancel this product listing? It will be removed from marketplace catalog."
    (confirm)="confirmDelete()"
    (cancel)="showDeleteDialog.set(false)">
  </fs-admin-confirm-dialog>
</div>
