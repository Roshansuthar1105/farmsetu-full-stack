<div class="space-y-6">
  <fs-admin-page-header title="User & Farmer Management" subtitle="Manage registration details, verify experts, and update farmer profiles.">
  </fs-admin-page-header>

  <!-- Data Table -->
  <fs-admin-data-table
    [columns]="columns"
    [data]="users()"
    [loading]="loading()"
    [totalElements]="totalElements()"
    [page]="page()"
    [pageSize]="size()"
    [rowActions]="rowActions"
    [filters]="filters"
    [selectable]="false"
    searchPlaceholder="Search users by name, email or phone..."
    emptyMessage="No users found"
    (pageChange)="onPageChange($event)"
    (searchChange)="onSearch($event)"
    (filterChange)="onFilterChange($event)"
    (rowActionEvent)="onRowAction($event)">
  </fs-admin-data-table>

  <!-- Edit User Modal -->
  <fs-admin-modal [open]="showEditModal()" title="Edit User Profile" (close)="showEditModal.set(false)">
    <form *ngIf="selectedUser()" (ngSubmit)="onSave()" class="space-y-4">
      <!-- Grid for basic inputs -->
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Full Name</label>
          <input type="text" [(ngModel)]="selectedUser().name" name="name"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
            required />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Email</label>
          <input type="email" [(ngModel)]="selectedUser().email" name="email"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Phone</label>
          <input type="text" [(ngModel)]="selectedUser().phone" name="phone"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Role</label>
          <select [(ngModel)]="selectedUser().role" name="role"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm">
            <option value="FARMER">FARMER</option>
            <option value="EXPERT">EXPERT</option>
            <option value="SELLER">SELLER</option>
            <option value="ADMIN">ADMIN</option>
          </select>
        </div>
      </div>

      <!-- Regional settings -->
      <div class="grid sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">State</label>
          <input type="text" [(ngModel)]="selectedUser().state" name="state"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">District</label>
          <input type="text" [(ngModel)]="selectedUser().district" name="district"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Village</label>
          <input type="text" [(ngModel)]="selectedUser().village" name="village"
            class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
        </div>
      </div>

      <!-- Bio -->
      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Bio</label>
        <textarea [(ngModel)]="selectedUser().bio" name="bio" rows="2"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"></textarea>
      </div>

      <!-- FARMER/EXPERT PROFILE SECTION -->
      <div *ngIf="selectedUser().role === 'FARMER' || selectedUser().role === 'EXPERT'"
        class="border-t border-slate-200 dark:border-slate-700 pt-4 mt-4 space-y-4">
        <h4 class="text-sm font-semibold text-slate-800 dark:text-slate-200">Farming & Soil Parameters</h4>

        <div class="grid sm:grid-cols-3 gap-4">
          <div>
            <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Farm Area (Acres)</label>
            <input type="number" step="0.1" [(ngModel)]="selectedUser().farmArea" name="farmArea"
              class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Soil Type</label>
            <input type="text" [(ngModel)]="selectedUser().soilType" name="soilType"
              class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
              placeholder="e.g. Clay, Sandy" />
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Soil pH</label>
            <input type="number" step="0.1" [(ngModel)]="selectedUser().soilPh" name="soilPh"
              class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
          </div>
        </div>

        <div class="grid sm:grid-cols-3 gap-4">
          <div>
            <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Water Source</label>
            <input type="text" [(ngModel)]="selectedUser().waterSource" name="waterSource"
              class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm"
              placeholder="e.g. Borewell, Rainfed" />
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Experience (Years)</label>
            <input type="number" [(ngModel)]="selectedUser().farmingExperience" name="farmingExperience"
              class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm" />
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase text-slate-500 dark:text-slate-400 mb-1">Farming Type</label>
            <select [(ngModel)]="selectedUser().farmingType" name="farmingType"
              class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-900 dark:text-white text-sm">
              <option value="CONVENTIONAL">Conventional</option>
              <option value="ORGANIC">Organic</option>
            </select>
          </div>
        </div>
      </div>
    </form>
    <div footer>
      <button (click)="showEditModal.set(false)"
        class="px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl text-sm">Cancel</button>
      <button (click)="onSave()" class="fs-btn-primary text-sm ml-2">Save Changes</button>
    </div>
  </fs-admin-modal>

  <!-- Confirm Deactivate Dialog -->
  <fs-admin-confirm-dialog
    [open]="showDeactivateDialog()"
    title="Deactivate User"
    message="Are you sure you want to deactivate this user? They will not be able to log in until reactivated."
    (confirm)="confirmDeactivate()"
    (cancel)="showDeactivateDialog.set(false)">
  </fs-admin-confirm-dialog>
</div>
