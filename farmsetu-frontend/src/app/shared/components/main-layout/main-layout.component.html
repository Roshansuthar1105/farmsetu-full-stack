<div class="min-h-screen flex bg-gray-50 dark:bg-gray-900">
  <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col">
    <div class="p-4 border-b border-gray-100 dark:border-gray-700">
      <h1 class="text-xl font-bold text-primary">{{ t('app.name') }}</h1>
      <p class="text-xs text-gray-500 truncate">{{ auth.currentUser()?.name }}</p>
    </div>
    <nav class="flex-1 overflow-y-auto p-2 space-y-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-green-50 text-primary dark:bg-green-900/30"
          class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700"
        >
          <span class="material-icons text-base">{{ item.icon }}</span>
          {{ t(item.labelKey) }}
        </a>
      }
    </nav>
    <div class="p-3 border-t border-gray-100 dark:border-gray-700 space-y-2">
      <button type="button" class="w-full text-left text-sm px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700" (click)="theme.toggleDark()">
        Toggle theme
      </button>
      <button type="button" class="w-full fs-btn-primary text-sm" (click)="logout()">Logout</button>
    </div>
  </aside>
  <main class="flex-1 overflow-auto">
    <header class="sticky top-0 z-10 bg-white/90 dark:bg-gray-800/90 backdrop-blur border-b border-gray-200 dark:border-gray-700 px-6 py-3 flex justify-between items-center">
      <span class="font-medium text-gray-600 dark:text-gray-300">FarmSetu Platform</span>
      <div class="flex gap-2">
        <select class="text-sm border rounded-lg px-2 py-1 dark:bg-gray-700" (change)="i18n.setLang($any($event.target).value)">
          <option value="en">English</option>
          <option value="hi">हिंदी</option>
        </select>
        <a routerLink="/app/notifications" class="material-icons text-gray-600 dark:text-gray-300">notifications</a>
        <a routerLink="/app/settings" class="material-icons text-gray-600 dark:text-gray-300">settings</a>
      </div>
    </header>
    <div class="p-6">
      <router-outlet />
    </div>
  </main>
</div>
