#spring.datasource.url=jdbc:postgresql://localhost:5432/farmsetu
server.port=${PORT:8080}
#spring.datasource.url=jdbc:postgresql://localhost:5432/farmsetu
spring.datasource.url=${PG_JDBC_PRODUCTION_URL:jdbc:postgresql://localhost:5432/farmsetu}
spring.datasource.username=${PGUSER:roshan}
spring.datasource.password=${PG_PASSWORD_PRODUCTION:roshan1234}
spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
farmsetu.jwt.secret=${JWT_SECRET:secret}
farmsetu.jwt.access-expiration-ms=${JWT_EXPIRE:604800000}
farmsetu.jwt.refresh-expiration-ms=${JWT_REFRESH:2592000000}

# Spring Mail Configurations
spring.mail.host=smtp.gmail.com
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:pass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jackson.mapper.accept-case-insensitive-enums=true

# File Upload Configurations
spring.servlet.multipart.max-file-size=${FILE_UPLOAD_SIZE:10MB}
spring.servlet.multipart.max-request-size=${FILE_UPLOAD_SIZE:10MB}

# Cloudinary Config
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.upload-preset=${CLOUDINARY_UPLOAD_PRESET:}


spring.jpa.hibernate.ddl-auto=none
# HikariCP optimizations for remote latency
# Limit idle connections to 1 (instead of 10) so it doesn't open 10 SSL handshakes at startup
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
# Prevent application startup from hanging if network briefly drops
spring.datasource.hikari.initialization-fail-timeout=-1